name: bitpet_app
description: "bit-pet — 반려 파충류 사육자를 위한 개체 관리 및 커뮤니티 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.3

  # 안전 저장소 (JWT)
  flutter_secure_storage: ^9.2.2

  # 로컬 DB (Local-First)
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.4
  path: ^1.9.0

  # 라우팅
  go_router: ^14.3.0

  # 유틸
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
