name: bit-pet

services:
  postgres:
    image: postgres:16-alpine
    container_name: bitpet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bitpet
      POSTGRES_USER: bitpet
      POSTGRES_PASSWORD: bitpet
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - bitpet-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitpet -d bitpet"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bitpet-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - bitpet-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bitpet-postgres-data:
  bitpet-redis-data:
