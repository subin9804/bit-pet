spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/bitpet
    username: bitpet
    password: bitpet
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG   # 요청 진입·매핑 로그
    org.springframework.web.filter: DEBUG                      # 필터 체인 통과 여부

bitpet:
  jwt:
    # 32+ bytes ASCII secret for local dev only — DO NOT use in prod.
    secret: "local-dev-secret-please-change-this-string-32b+"
