spring:
  application:
    name: bit-pet
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${BITPET_OAUTH_GOOGLE_CLIENT_ID:}
            client-secret: ${BITPET_OAUTH_GOOGLE_CLIENT_SECRET:}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google
          kakao:
            client-id: ${BITPET_OAUTH_KAKAO_CLIENT_ID:}
            client-secret: ${BITPET_OAUTH_KAKAO_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-authentication-method: client_secret_post
            client-name: Kakao
          naver:
            client-id: ${BITPET_OAUTH_NAVER_CLIENT_ID:}
            client-secret: ${BITPET_OAUTH_NAVER_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    root: INFO
    io.bitpet: DEBUG

# === Application-specific config (Bit-Pet) ===
bitpet:
  jwt:
    # Override per-profile. Must be at least 32 bytes (256-bit) for HS256.
    secret: ${BITPET_JWT_SECRET:change-me-in-each-profile}
    access-token-validity: PT30M     # 30 minutes
    refresh-token-validity: P14D     # 14 days
    issuer: bit-pet
  token-enc-key: ${BITPET_TOKEN_ENC_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  serial-number:
    # Pool excludes ambiguous chars (0/O/I/1) → 32 chars
    pool: "23456789ABCDEFGHJKLMNPQRSTUVWXYZ"
    initial-length: 6
    expansion-threshold: 0.8         # 80% saturation triggers length+1
    max-length: 8
  security:
    cors:
      allowed-origins: ${BITPET_CORS_ORIGINS:http://localhost:3000,http://localhost:8081}
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
    public-paths:
      - /actuator/health
      - /actuator/info
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /api/v1/auth/**
      - /api/v1/species
      - /api/v1/species/*/morphs
      - /api/v1/memo-tags
      - /oauth2/authorization/**
      - /login/oauth2/code/**
  oauth2:
    # 로그인 성공 시 클라이언트로 리다이렉트할 URL (deep link 가능)
    success-redirect-uri: ${BITPET_OAUTH_SUCCESS_REDIRECT:http://localhost:3000/oauth/callback}
    failure-redirect-uri: ${BITPET_OAUTH_FAILURE_REDIRECT:http://localhost:3000/oauth/error}
  s3:
    endpoint: ${BITPET_S3_ENDPOINT:http://localhost:4566}
    region: ${BITPET_S3_REGION:ap-northeast-2}
    bucket: ${BITPET_S3_BUCKET:bitpet-dev}
    access-key: ${BITPET_S3_ACCESS_KEY:test}
    secret-key: ${BITPET_S3_SECRET_KEY:test}
    presign-ttl-minutes: ${BITPET_S3_PRESIGN_TTL:15}
    path-style-access: ${BITPET_S3_PATH_STYLE:true}
